# ==============================================================================
# CI/CD Pipeline — Scalable Log Anomaly Detection Platform
# ==============================================================================
# Triggers on push to main and all pull requests.
# Stages: Lint → Test → Train/Evaluate → Docker Build
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: log-anomaly-platform

jobs:
  # ===========================================================================
  # Stage 1: Lint & Type Check
  # ===========================================================================
  lint:
    name: "🔍 Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

      - name: Run MyPy type checker
        run: mypy . --ignore-missing-imports
        continue-on-error: true  # Advisory for now

  # ===========================================================================
  # Stage 2: Unit & Integration Tests
  # ===========================================================================
  test:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml
        env:
          LADP_ENV: test

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  # ===========================================================================
  # Stage 3: Training Pipeline Validation
  # ===========================================================================
  train-eval:
    name: "🧠 Train & Evaluate"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline (small dataset)
        run: python main.py --mode train --logs 5000 --no-tune
        env:
          LADP_ENV: ci

      - name: Verify model artifacts exist
        run: |
          test -f models/artifacts/latest/model.pkl
          test -f models/artifacts/latest/metadata.json
          echo "✅ Model artifacts verified"

  # ===========================================================================
  # Stage 4: Docker Build
  # ===========================================================================
  docker:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image health
        run: |
          docker run -d --name test-container -p 8000:8000 \
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          sleep 30
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
